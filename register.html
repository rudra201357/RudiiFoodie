<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in | Sign Up</title>
 <link rel="icon" type="image/png" href="images/logo.png">
 <link rel="stylesheet" href="css/register.css">
</head>

<body>
    <div class="welcome-brand">
        <img src="images/logo.png" alt="RudiiFoodie logo">
        <h2>RudiiFoodie Welcomes You</h2>
    </div>
    <div class="container" id="container">
        <div class="form-container sign-up-container">
            <form method="POST" action="signup.php">
                <h1>Create Account</h1>
                <input type="text" id="name" name="name" placeholder="Name" required />
                <input type="email" id="email" name="email" placeholder="Email" required />
                <input type="number" id="phone" name="phone" placeholder="Phone" required />
                <input type="password" id="password" name="password" placeholder="Password" required />
                <button>Sign Up</button>
            </form>
        </div>
        <div class="form-container sign-in-container">
            <form action="signin.php" method="POST">
                <h1>Sign in</h1>
                <input type="text" id="email" name="email"  placeholder="Email or phone" required />
                <input type="password"  id="password" name="password" placeholder="Password" required />
                <a href="forgetpassword.php">Forgot your password?</a>
                <button type="submit">Sign In</button>
            </form>
        </div>
        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h1>Welcome Back!</h1>
                    <p><span>Cravings Don't Wait.</span>
                        <span>Neither should you — sign in and get your favorites on the way!</span>
                    </p>
                    <button class="ghost" id="signIn">Sign In</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h1>Hello, Friend!</h1>
                    <p>Enter your personal details and start journey with us</p>
                    <button class="ghost" id="signUp">Sign Up</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>
            Created with <i class="fa fa-heart"></i> by
            <a target="_blank" href="index.php">RudiiFoodie</a>
            </a>.
        </p>
    </footer>
    <script>
        const signUpButton = document.getElementById('signUp');
        const signInButton = document.getElementById('signIn');
        const container = document.getElementById('container');

        signUpButton.addEventListener('click', () => {
            container.classList.add("right-panel-active");
        });

        signInButton.addEventListener('click', () => {
            container.classList.remove("right-panel-active");
        });
    </script>
</body>

</html>
